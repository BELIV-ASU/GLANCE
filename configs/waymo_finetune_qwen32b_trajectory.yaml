################################################################################
# waymo_finetune_qwen32b_trajectory.yaml
# Qwen2.5-VL-32B fine-tuning config using trajectory-analysis annotations.
################################################################################

model:
  name: "qwen2.5-vl-32b"
  trust_remote_code: true
  attn_implementation: "eager"
  dtype: "bfloat16"
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

data:
  waymo_root: "/scratch/rbaskar5/Dataset/waymo_front"
  annotations_json: "/scratch/rbaskar5/GLANCE/data/waymo_trajectory/train.jsonl"
  val_annotations_json: "/scratch/rbaskar5/GLANCE/data/waymo_trajectory/val.jsonl"
  image_size: [448, 448]
  max_seq_length: 2048
  max_samples: 0
  num_workers: 4

training:
  output_dir: "/scratch/rbaskar5/GLANCE/checkpoints/waymo/qwen2.5-vl-32b-trajectory"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  gradient_checkpointing: true
  bf16: true
  tf32: true
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
  report_to: "none"
  resume_from_checkpoint: null

distributed:
  accelerate_config: "/scratch/rbaskar5/GLANCE/configs/accelerate_2gpu.yaml"
  deepspeed_config: null
